name: CI Pipeline

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm test

  build-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/app:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/app:latest

notify:
    needs: build-push
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send notification to n8n
        run: |
          curl -X POST "http://77.90.13.167:5678/webhook-test/cc2eccda-baeb-4ecd-9d85-e737d80bd37e" \
            -H "Content-Type: application/json" \
            -d '{"status":"${{ job.status }}","branch":"${{ github.ref_name }}","author":"${{ github.actor }}"}'